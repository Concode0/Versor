name: New Task / Dataset Request
description: Request support for a new scientific task, dataset, or benchmark
labels: ["enhancement", "task"]
body:
  - type: markdown
    attributes:
      value: |
        Versor supports tasks via a `BaseTask` template. Fill in this template to propose
        a new task (molecule property, dynamics, NLP, signal processing, etc.).

  - type: input
    id: task_name
    attributes:
      label: Task / Dataset Name
      placeholder: "e.g. QM7, CATH protein folding, ERA5 climate"
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - "Molecular / Chemistry"
        - "Protein / Biology"
        - "Physics / Dynamics"
        - "Climate / Weather"
        - "Computer Vision / 3D"
        - "NLP / Reasoning"
        - "Signal Processing / EEG"
        - "Symbolic Regression"
        - "CAD / Geometry"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: suggested_algebra
    attributes:
      label: Suggested Algebra Signature
      description: Which Clifford algebra best fits this domain's geometry?
      options:
        - "Cl(3,0) — Euclidean 3D (molecules, point clouds)"
        - "Cl(4,0) — Euclidean 4D"
        - "Cl(6,0) — High-dimensional semantic manifolds"
        - "Cl(2,1) — Minkowski / spacetime"
        - "Cl(4,1) — Conformal (translation-as-rotation)"
        - "Cl(3,0,1) — Projective / degenerate"
        - "Unsure — need MetricSearch"
        - "Other (specify in description)"

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: |
        Describe the task: inputs, outputs, evaluation metric, data source/license.
        Why is a GBN / rotor-based approach a good fit?
    validations:
      required: true

  - type: textarea
    id: data_source
    attributes:
      label: Data Source
      description: URL, paper reference, or pip package for the dataset.
    validations:
      required: true

  - type: textarea
    id: baseline
    attributes:
      label: Baseline Results (if known)
      description: State-of-the-art numbers or relevant baselines to compare against.

  - type: checkboxes
    id: willing_to_contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to implement this task and submit a PR
        - label: I can provide access to the dataset
        - label: I can help validate results
