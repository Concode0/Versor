# @package _global_
name: "deeplense"
algebra:
  p: 1
  q: 3                            # STA Cl(1,3), dim=16
  r: 0
  device: "mps"
dataset:
  name: "deeplense"
  variant: "synthetic"             # synthetic|model_1|model_2|model_3|model_4
  root: "./data/deeplense"
  image_size: 64                   # resize to 64x64 for efficiency
  patch_size: 8                    # 8x8 patches -> 64 patches per image
  n_samples: 3000                  # synthetic sample count
  max_samples: null
model:
  hidden_channels: 32
  num_encoder_layers: 4
  num_decoder_layers: 4
  num_rotors: 8
  num_attention_heads: 4
  use_decomposition: false
  decomp_k: 10
  use_rotor_backend: false
  mode: "classify"                     # full|reconstruct|convergence|classify
training:
  epochs: 100
  lr: 0.001
  batch_size: 32
  optimizer_type: "riemannian_adam"
  max_bivector_norm: 10.0
  num_workers: 0
  seed: 42
  loss_weights:
    source: 1.0
    kappa: 0.5
    classify: 5.0 #0.3
    physics: 0.1
    sparsity: 0.01
    grade_reg: 0.01
  target_spectrum: [0.1, 0.25, 0.3, 0.2, 0.15]  # 5 grades for Cl(1,3)
